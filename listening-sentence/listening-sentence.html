<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="flex justify-between items-center px-6 py-4 border-b">
      <!-- Left: Hamburger -->
      <button id="menu-toggle"  class="flex items-center justify-center w-8 h-8">
        <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Center: Title -->
      <h1 class="text-lg font-semibold text-gray-800">Listening Sentence</h1>

      <!-- Right: Profile Picture -->
      <div class="w-9 h-9 bg-orange-300 rounded-full flex items-center justify-center text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM6 20c0-2.21 
                  3.58-4 6-4s6 1.79 6 4"/>
        </svg>
      </div>
    </nav>

    <!-- Sidebar -->
    <div id="sidebar"
        class="fixed top-0 left-0 h-full w-48 bg-white shadow-lg transform -translate-x-full transition-transform duration-300 z-50">
        <div class="p-4 border-b font-semibold text-lg">Menu</div>
        <ul class="p-4 space-y-3">
            <li><a href="/EngCourse/listening-sentence/listening-sentence.html" class="block text-gray-700 hover:text-blue-600">Word Listening</a></li>
            <li><a href="/EngCourse/listening-word/listening-word.html" class="block text-gray-700 hover:text-blue-600">Sentence Listening</a></li>
            <li><a href="Menu.html" class="block text-gray-700 hover:text-blue-600">Word Image</a></li>
            <li><a href="/EngCourse/listening-word/listening-word.html" class="block text-gray-700 hover:text-blue-600">Sentence</a></li>
        </ul>
    </div>

    <!-- CONTENT -->
     <main class="max-w-6xl mx-auto px-4 relative min-h-[665px] flex flex-col items-center justify-start pt-10 sm:pt-16">

      <!-- Gambar orang di kiri bawah -->
      <img
        class="absolute left-0 bottom-0 w-40 sm:w-60 md:w-72 h-auto"
        src="/EngCourse/listening-sentence/img/people-sentence.png"
        alt="people"
        style="z-index: 1"
      />

      <div class="flex flex-col items-center w-full z-10 text-center">
        
        <!-- Gambar speaker -->
        <img class="w-48 sm:w-64 md:w-80 mb-6" src="/EngCourse/listening-sentence/img/speaker.png" alt="speaker" />

        <!-- Judul -->
        <h3 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-6 sm:mb-10">
          What <span class="text-blue-500">Sentence</span> do you hear?
        </h3>

        <!-- Input -->
        <input
          type="text"
          placeholder="Type the word here"
          class="border bg-blue-950 rounded-full py-3 px-6 text-white text-lg sm:text-xl w-full max-w-[90%] sm:max-w-[600px] text-center"
        />

        <!-- Tombol -->
        <button
          class="bg-blue-500 text-white rounded-full py-2 px-6 mt-6 text-base sm:text-lg font-semibold hover:bg-blue-600 transition">
          Submit
        </button>
      </div>
    </main>
    
  </body>
</html>
