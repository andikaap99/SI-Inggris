<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="flex justify-between items-center px-6 py-4 border-b">
      <!-- Left: Hamburger -->
      <button id="menu-toggle" class="flex items-center justify-center w-8 h-8">
        <svg
          class="w-6 h-6 text-gray-700"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- Center: Title -->
      <h1 class="text-lg font-semibold text-gray-800">Listening Sentence</h1>

      <!-- Right: Profile Picture -->
      <div
        class="w-9 h-9 bg-orange-300 rounded-full flex items-center justify-center text-white"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM6 20c0-2.21 
                  3.58-4 6-4s6 1.79 6 4"
          />
        </svg>
      </div>
    </nav>

    <!-- Sidebar -->
    <div
      id="sidebar"
      class="fixed top-0 left-0 h-full w-48 bg-white shadow-lg transform -translate-x-full transition-transform duration-300 z-50"
    >
      <div class="p-4 border-b font-semibold text-lg">Menu</div>
      <ul class="p-4 space-y-3">
        <li>
          <a
            href="/EngCourse/listening-sentence/listening-sentence.html"
            class="block text-gray-700 hover:text-blue-600"
            >Word Listening</a
          >
        </li>
        <li>
          <a
            href="/EngCourse/listening-word/listening-word.html"
            class="block text-gray-700 hover:text-blue-600"
            >Sentence Listening</a
          >
        </li>
        <li>
          <a href="Menu.html" class="block text-gray-700 hover:text-blue-600"
            >Word Image</a
          >
        </li>
        <li>
          <a
            href="/EngCourse/listening-word/listening-word.html"
            class="block text-gray-700 hover:text-blue-600"
            >Sentence</a
          >
        </li>
      </ul>
    </div>

    <!-- CONTENT -->
    <main
      class="min-h-[660px] max-w-6xl mx-auto px-4 relative flex"
      style="
        background-image: url('./img/bg-listening-sentence.png');
        background-size: cover;
        background-position: center;
      "
    >
      <div class="flex flex-col items-center w-full">
        <!-- Gambar speaker di tengah atas -->
        <img class="w-80 h-100" src="./img/speaker.png" alt="speaker" />
        <p class="text-3xl font-bold mb-12 text-center">
          What <span class="text-purple-800">sentence</span> do you hear?
        </p>
        <input
          type="text"
          placeholder="Type the sentence here"
          class="border bg-blue-950 rounded-full p-2 text-white text-xl py-4 px-8 w-[750px] max-w-full text-center"
        />
        <button
          class="bg-blue-500 text-white rounded-full py-2 px-6 mt-8 text-lg font-semibold"
        >
          Submit
        </button>
      </div>
    </main>
  </body>
</html>
